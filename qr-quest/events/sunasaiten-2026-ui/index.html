<!DOCTYPE html>
<html lang="ja">
<head>
  <script src="event-config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRクエスト in 2026吹上浜砂の祭典（ホーム）</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      text-align: center;
      padding: 70px 20px 110px;
      margin: 0;

      /* 背景画像（砂漠＋砂のお城） */
      background-image: url("images/bg_desert_castle.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed; /* 重いと感じたらこの1行は消してOK */
    }

    /* 背景の上でも読みやすくする半透明ボックス */
    .contentBox{
      max-width: 680px;
      margin: 70px auto 0;
      padding: 18px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 192, 215, 0.55);
      backdrop-filter: blur(2px);
    }

    /* タイトル3行固定 */
    h1 {
      font-size: 1.8rem;
      margin: 10px 0 14px;
      line-height: 1.25;
      color: #ff4081;
    }
    .titleLine1 { display:block; font-size: 1.85rem; font-weight: 900; }
    .titleLine2 { display:block; font-size: 1.35rem; font-weight: 900; white-space: nowrap; }
    .titleLine3 { display:block; font-size: 1.12rem; font-weight: 800; margin-top: 2px; }

    p {
      font-size: 1.05rem;
      margin: 0 0 22px;
      line-height: 1.6;
    }

    .btn {
      display: block;
      width: 86%;
      max-width: 340px;
      margin: 10px auto;
      padding: 14px 18px;
      font-size: 1.12rem;
      border: none;
      border-radius: 10px;
      background-color: #4fa3ff;
      color: white;
      cursor: pointer;
      font-weight: 800;
      text-decoration: none;
    }
    .btn:hover { background-color: #1e88e5; }

    .btn.sub {
      background-color: #ffffff;
      color: #1e88e5;
      border: 2px solid #1e88e5;
    }
    .btn.sub:hover { background-color: #e8f3ff; }

    .tag {
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#e8f3ff;
      color:#1e5aa8;
      font-size:12px;
      margin-bottom:10px;
      font-weight: 800;
    }

    .muted {
      color: #3b3b3b;
      font-size: 0.95rem;
      margin-top: 14px;
      opacity: 0.9;
    }

    #qrquest-start-warning{
      display:none;
      margin:12px auto;
      max-width:520px;
      padding:10px 12px;
      border:1px solid #f0c36d;
      background:#fff8e1;
      border-radius:10px;
      font-size:0.95rem;
      line-height:1.5;
    }
  
    /* --- 印刷/PDF用（白いスクリーンが短く見える問題の対策） --- */
    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

      /* 印刷時は紙に合わせて安定させる */
      body{
        padding: 0 !important;
        background-attachment: scroll !important;
      }

      /* 印刷時だけ「普通の白」にして途中で切れないようにする */
      .contentBox{
        background: #ffffff !important;
        border: 1px solid #dddddd !important;

        /* 改ページをまたいでも背景が続くようにする（背景だけ短い問題の対策） */
        -webkit-box-decoration-break: clone;
        box-decoration-break: clone;

        /* 分割を許可（avoidだと背景が途中で止まることがある） */
        page-break-inside: auto !important;
        break-inside: auto !important;

        /* 印刷用の安定化 */
        border-radius: 0 !important;
        backdrop-filter: none !important;
        overflow: visible !important;
        height: auto !important;
        margin: 0 auto !important;
      }

      /* ボタンの色が消えないように固定 */
      .btn{
        background: #4fa3ff !important;
        color: #ffffff !important;
      }
      .btn.sub{
        background: #ffffff !important;
        color: #1e88e5 !important;
        border: 2px solid #1e88e5 !important;
      }
    }

  </style>
</head>

<body>
  <div class="contentBox">
<h1>
      <span class="titleLine1">QRクエスト</span>
      <span class="titleLine2">in 2026吹上浜砂の祭典</span>
      <span class="titleLine3">砂さんぽ～砂でつくる城物語～</span>
    </h1>

    <!-- ここから下：必要ボタンのみ -->
    <a class="btn sub" href="howto.html">📘 遊び方（あそびかた）</a>
    <a class="btn sub" href="map.html">🗺️ 地図（ちず）をみる</a>
    <a class="btn" id="btnQuestGo" href="quest_go.html">🧩 QRクエストへGO！</a>

    <p class="muted">Powered by SakuLink</p>

    <div id="qrquest-start-warning">
      まだ受付スタートが完了していません。受付でスタートQRを読み込んでから「QRクエストへGO！」を押してください。
    </div>
  </div>

<script>
(function(){
  function getStarted(){
    try{
      return localStorage.getItem('started') === 'true' || localStorage.getItem('qrquest_started') === 'true';
    }catch(e){ return false; }
  }
  var btn = document.getElementById('btnQuestGo');
  if(btn){
    btn.addEventListener('click', function(ev){
      if(!getStarted()){
        ev.preventDefault();
        var box = document.getElementById('qrquest-start-warning');
        if(box){ box.style.display = 'block'; box.scrollIntoView({behavior:'smooth', block:'center'}); }
        else{ alert('まだ受付スタートが完了していません。受付でスタートQRを読み込んでください。'); }
      }
    });
  }
})();
</script>

</body>
</html>
