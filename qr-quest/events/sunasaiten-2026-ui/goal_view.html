<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>完成画像（保存）</title>
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background:#0b0b0b;
      color:#fff;
      text-align:center;
      padding:16px 12px 24px;
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
    }
    h1{ font-size:18px; margin:6px 0 10px; }
    p{ margin:0 0 14px; line-height:1.7; color:#eaeaea; }
    img{
      width:100%;
      height:auto;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:#fff;
    }
    .btn{
      display:block;
      width:100%;
      padding:14px 14px;
      border:none;
      border-radius:14px;
      margin-top:14px;
      font-weight:900;
      font-size:1.05rem;
      cursor:pointer;
    }
    .btnSub{ background:#ffffff; color:#111; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>かんせい がぞう</h1>
    <p>下の画像を<strong>ながおし</strong>して「しゃしんに ほぞん」してね。</p>

    <img id="goalImg" src="images/challenge/goal.png" alt="完成画像" />

    <button class="btn btnSub" id="backBtn">↩️ もどる</button>
  </div>

  <script>
    // もどる：履歴があれば戻る／なければprogressへ
    document.getElementById('backBtn').addEventListener('click', () => {
      if (history.length > 1) history.back();
      else location.href = 'progress.html';
    });

    // 念のため：URL解決を現在の場所に合わせる（www/非www対策）
    try{
      const img = document.getElementById('goalImg');
      img.src = new URL('./images/challenge/goal.png', location.href).href;
    }catch(e){}
  </script>
</body>
</html>
